<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Audio Examples</title>
  <style>
    :root {
      --bg: #f3f5f9;
      --surface: #ffffff;
      --surface-soft: #f7f9fc;
      --line: #d9dfeb;
      --text: #1f2633;
      --muted: #627084;
      --accent: #265ec7;
      --accent-soft: #eaf1ff;
      --danger: #b34b43;
      --radius: 14px;
      --shadow: 0 10px 24px rgba(24, 34, 54, 0.08);
      --spectrogram-aspect-ratio: 7 / 3.2;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #f7f8fb, #eff2f8);
      color: var(--text);
      font: 16px/1.45 "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }

    body { padding: 24px; }

    .wrap {
      max-width: 1440px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .site-card,
    .panel,
    .card,
    .empty {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .site-card {
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .sub,
    .meta,
    .tiny,
    .section-text {
      color: var(--muted);
    }

    .sub {
      margin: 0;
      font-size: 19px;
      line-height: 1.55;
    }

    .sections-root {
      display: grid;
      gap: 16px;
    }

    .section {
      padding: 16px;
      display: grid;
      gap: 12px;
      border: 1px solid #ced7e8;
      border-left: 4px solid #9eb9eb;
      border-radius: var(--radius);
      background: linear-gradient(180deg, #fbfcff, #f7f9fd);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9), 0 6px 14px rgba(24, 34, 54, 0.05);
    }

    .section.section-has-preview {
      gap: 4px;
    }

    .section.section-has-preview .section-header {
      padding-bottom: 0;
    }

    .section.section-has-preview .ablation-preview-panel {
      padding-top: 0;
    }

    .section-lock-scroll {
      overflow-anchor: none;
    }

    .section-header {
      display: grid;
      gap: 4px;
      padding: 2px 2px 8px;
    }

    .section-text {
      margin: 0;
      white-space: pre-wrap;
    }

    .text-separator-gap {
      display: block;
      height: 10px;
    }

    .section-expander {
      border: 1px solid #d4dcec;
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
    }

    .section-expander > summary {
      list-style: none;
      cursor: pointer;
      padding: 12px 14px;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-soft);
      border-bottom: 1px solid #d4dcec;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .section-expander > summary::-webkit-details-marker {
      display: none;
    }

    .section-expander > summary::after {
      content: "▸";
      color: var(--accent);
      font-size: 12px;
      line-height: 1;
      transition: transform 140ms ease;
      transform-origin: 50% 50%;
    }

    .section-expander[open] > summary::after {
      transform: rotate(90deg);
    }

    .section-expander-content {
      display: grid;
      gap: 12px;
      padding: 12px;
    }

    .panel {
      padding: 12px;
      box-shadow: none;
      border-color: #d4dcec;
    }

    .tabs,
    .label-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .label-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .label-hint {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .sample-nav {
      display: grid;
      grid-template-columns: auto minmax(220px, 360px) auto auto auto minmax(340px, 520px);
      align-items: center;
      gap: 10px;
    }

    .sample-separator {
      color: var(--muted);
      font-size: 20px;
      line-height: 1;
      text-align: center;
    }

    .section-colorbar {
      display: flex;
      justify-content: flex-end;
      min-width: 340px;
    }

    .section-colorbar-inner {
      display: grid;
      justify-items: end;
      gap: 0;
    }

    .section-colorbar-img {
      display: block;
      width: min(460px, 100%);
      height: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    button,
    select {
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      font: inherit;
    }

    button { cursor: pointer; }

    button:hover,
    select:hover {
      border-color: #b8c3d6;
    }

    button.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .models {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .all-samples-list {
      display: grid;
      gap: 12px;
    }

    .all-sample-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: var(--surface-soft);
      display: grid;
      gap: 8px;
    }

    .all-sample-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .all-sample-label {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
      font-size: 12px;
    }

    .inline-label-badge {
      vertical-align: baseline;
    }

    .all-sample-file {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .ablation-preview-panel {
      --preview-scale: 1;
      display: grid;
      gap: calc(12px * var(--preview-scale));
      padding: calc(12px * var(--preview-scale));
    }

    .ablation-preview-note {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .ablation-preview-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: calc(10px * var(--preview-scale));
    }

    .ablation-preview-example {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: calc(10px * var(--preview-scale));
      display: grid;
      gap: calc(8px * var(--preview-scale));
    }

    .ablation-preview-example-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .ablation-preview-models {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: calc(8px * var(--preview-scale));
    }

    .ablation-preview-model {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: calc(8px * var(--preview-scale));
      background: var(--surface-soft);
      display: grid;
      gap: calc(6px * var(--preview-scale));
      min-width: 0;
    }

    .ablation-preview-model-title {
      font-size: calc(15px * var(--preview-scale));
      color: var(--text);
      font-weight: 600;
      line-height: 1.25;
    }

    .ablation-mid-text {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .card {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .card h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .sample-name {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 7px 10px;
      background: var(--surface-soft);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: nowrap;
      overflow: auto;
    }

    audio { width: 100%; }

    .spectrogram-wrap {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
    }

    .spectrogram-stage {
      position: relative;
      line-height: 0;
      cursor: pointer;
      aspect-ratio: var(--spectrogram-aspect-ratio);
      background: #f8f9fc;
    }

    .spectrogram-img {
      width: 100%;
      display: block;
      height: 100%;
      object-fit: contain;
    }

    .spectrogram-cursor {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 2px;
      background: #2a65dd;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.6);
      pointer-events: none;
    }

    .spectrogram-slider {
      width: 100%;
      margin: 0;
      border: 0;
      border-top: 1px solid var(--line);
      border-radius: 0;
      background: #fff;
      padding: 8px 10px;
    }

    .missing {
      color: var(--danger);
      border: 1px dashed #e7b7b1;
      border-radius: 10px;
      padding: 10px;
      background: #fff3f2;
    }

    .tiny {
      font-size: 13px;
    }

    .source-note {
      margin-top: -2px;
    }

    .source-link {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(38, 94, 199, 0.35);
    }

    .source-link:hover {
      border-bottom-color: rgba(38, 94, 199, 0.8);
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    .kbd {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 1px 7px;
      background: var(--surface-soft);
      font-size: 12px;
    }

    .toc {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface-soft);
      padding: 10px 12px;
      display: grid;
      gap: 8px;
    }

    .toc-title {
      font-size: 13px;
      color: var(--muted);
      margin: 0;
    }

    .toc-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .toc-link {
      text-decoration: none;
      color: var(--accent);
      border: 1px solid #ccd9f2;
      border-radius: 999px;
      background: #f0f5ff;
      padding: 5px 10px;
      font-size: 13px;
    }

    .toc-link:hover {
      border-color: #aebee0;
      background: #e9f0ff;
    }

    @media (max-width: 980px) {
      .sample-nav {
        grid-template-columns: auto minmax(0, 1fr) auto;
      }

      .sample-nav .meta {
        grid-column: 1 / -1;
      }

      .sample-separator {
        display: none;
      }

      .section-colorbar {
        grid-column: 1 / -1;
        justify-content: flex-start;
      }

      .section-colorbar-inner {
        justify-items: start;
      }

      .ablation-preview-grid {
        grid-template-columns: 1fr;
      }

      .ablation-preview-models {
        grid-template-columns: 1fr;
      }

    }
  </style>
</head>
<body>

    <main class="site-card">
      <header>
        <h1 id="page-title">Audio Examples</h1>
        <p class="sub" id="page-description">Side-by-side comparison of generated audio samples.</p>
        <p class="tiny" style="margin:8px 0 0">

        </p>
      </header>
      <nav class="toc" id="toc"></nav>
      <div id="sections-root" class="sections-root"></div>
    </main>
  </div>

      function appendSampleMedia(container, url, spectrogramUrl, missingText) {
        let audio = null;

        if (url) {
          audio = document.createElement("audio");
          audio.controls = true;
          audio.preload = "none";
          audio.src = url;
        } else {
          const missing = document.createElement("div");
          missing.className = "missing";
          missing.textContent = missingText;
          container.appendChild(missing);

        if (spectrogramUrl) {
          const specWrap = document.createElement("div");
          specWrap.className = "spectrogram-wrap";

          const specImg = document.createElement("img");

          specSlider.max = "1000";
          specSlider.step = "1";
          specSlider.value = "0";
          specSlider.disabled = !audio;
          specWrap.appendChild(specSlider);

          const setProgress = (fraction) => {
            const clamped = Math.min(1, Math.max(0, Number(fraction) || 0));
            specCursor.style.left = `${(clamped * 100).toFixed(3)}%`;
            specSlider.value = String(Math.round(clamped * 1000));
          };
          setProgress(0);

          if (audio) {
            const syncFromAudio = () => {
              if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;
              setProgress(audio.currentTime / audio.duration);
            };

            const seekByFraction = (fraction) => {
              if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;
              audio.currentTime = Math.min(1, Math.max(0, fraction)) * audio.duration;
              syncFromAudio();
            };

            audio.addEventListener("loadedmetadata", syncFromAudio);
            audio.addEventListener("timeupdate", syncFromAudio);
            audio.addEventListener("seeked", syncFromAudio);

            let rafId = 0;
            const stopSmoothSync = () => {
              if (rafId) {
                cancelAnimationFrame(rafId);
                rafId = 0;
              }
            };
            const smoothSyncTick = () => {
              syncFromAudio();
              if (!audio.paused && !audio.ended) {
                rafId = requestAnimationFrame(smoothSyncTick);
              } else {
                rafId = 0;
              }
            };
            const startSmoothSync = () => {
              if (rafId) return;
              rafId = requestAnimationFrame(smoothSyncTick);
            };

            audio.addEventListener("play", startSmoothSync);
            audio.addEventListener("playing", startSmoothSync);
            audio.addEventListener("pause", stopSmoothSync);
            audio.addEventListener("ended", () => {
              stopSmoothSync();
              syncFromAudio();
            });
            audio.addEventListener("emptied", stopSmoothSync);

            specSlider.addEventListener("input", () => {
              const fraction = Number(specSlider.value) / 1000;
              seekByFraction(fraction);
            });

            specStage.addEventListener("click", (event) => {
              const rect = specStage.getBoundingClientRect();
              if (rect.width <= 0) return;
              const fraction = (event.clientX - rect.left) / rect.width;
              seekByFraction(fraction);
            });
          }

          container.appendChild(specWrap);
        } else if (spectrogramsEnabled) {
          const specMissing = document.createElement("div");
          specMissing.className = "tiny";
          specMissing.textContent = "Spectrogram is missing for this sample.";
          container.appendChild(specMissing);
        }

        if (audio) {
          container.appendChild(audio);
        }

      function renderGroupTabs() {

              renderMeta();
              renderModels();
            });

        els.sampleMeta.textContent = sampleName
          ? `${state.sampleIndex + 1} / ${samples.length}`

      function renderMeta() {
        const group = currentGroup();
        const modelCount = group && Array.isArray(group.models) ? group.models.length : 0;
        els.groupMeta.textContent = `${modelCount} models`;

      function renderSectionColorbar() {
        const info = sectionColorbars[section.id];
        const hasColorbar = !!(spectrogramsEnabled && info && info.image);

            card.appendChild(sourceNote);
          }
          const gamma = model.selected_gamma;
          const labelMap = (((model.gammas || {})[gamma] || {})[state.label]) || {};
          const modelSampleNames = Object.keys(labelMap);
          const modelSampleName = modelSampleNames[state.sampleIndex] || null;
          const url = modelSampleName ? labelMap[modelSampleName] : null;
          const spectrogramLabelMap = (((model.spectrograms || {})[gamma] || {})[state.label]) || {};
          const spectrogramUrl = modelSampleName ? spectrogramLabelMap[modelSampleName] : null;
          appendSampleMedia(card, url, spectrogramUrl, "Sample missing for current model / label.");

      function render() {
        renderGroupTabs();
        renderLabelTabs();
        renderSampleControls();
        renderSectionColorbar();
        renderMeta();
        renderModels();
      }

      function renderWithStableViewport(renderFn) {
        if (!keepScrollOnSampleChange) {
          renderFn();
          return;
        }

        const anchorEl = samplePanel;
        const beforeTop = anchorEl.getBoundingClientRect().top;
        const adjustScroll = () => {
          const afterTop = anchorEl.getBoundingClientRect().top;
          const delta = afterTop - beforeTop;

        adjustScroll();
        requestAnimationFrame(() => {
          adjustScroll();
          requestAnimationFrame(adjustScroll);
        });
      }

      wrap.addEventListener("keydown", (event) => {
        if (event.target && ["INPUT", "TEXTAREA", "SELECT"].includes(event.target.tagName)) return;

              renderModels();

          if (state.sampleIndex < samples.length - 1) {
            state.sampleIndex += 1;
            renderWithStableViewport(() => {
              renderSampleControls();
              renderMeta();
              renderModels();
            });
          }
        } else if (/^[0-9]$/.test(event.key)) {
          const labels = currentLabelOptions();
          const next = `label_${event.key.padStart(2, "0")}`;
          if (labels.includes(next)) {
            state.label = next;
            state.sampleIndex = 0;
            render();
          }
        }
      });

      wrap.tabIndex = 0;
      renderIntroPreview();
      render();
      return wrap;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatRichText(value) {
      let raw = String(value ?? "").replace(/\r\n/g, "\n");
      raw = raw.replace(/\\n/g, "\n");
      const parts = raw.split(/\n\s*---\s*\n/g);
      const rendered = parts.map((part) => {
        let escaped = escapeHtml(part);
        escaped = escaped.replace(/\{\{label:([^\n{}]+?)\}\}/g, '<span class="all-sample-label inline-label-badge">$1</span>');
        escaped = escaped.replace(/\*\*([^\n]+?)\*\*/g, "<strong>$1</strong>");
        return escaped;
      });
      return rendered.join('<span class="text-separator-gap" aria-hidden="true"></span>');
    }
  </script>
</body>
</html>
